name: API Test

on:
  push:
    branches:
      - master
      - hai_dev

jobs:
  api-test:
    runs-on: ubuntu-latest

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 设置 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装测试依赖
        run: |
          python -m pip install --upgrade pip
          pip install pytest requests pyyaml allure-pytest

      - name: 执行接口自动化测试
        run: |
          rm -rf tests/allure-results
          pytest tests/test_login.py -v --alluredir=tests/allure-results

      - name: 上传 Allure 原始结果
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: tests/allure-results
name: Auto Deploy (Docker Version)

on:
  push:
    branches:
      - master
      - hai_dev

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 1. 设置 Java 环境并进行 Maven 打包
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean package -DskipTests

      # 2. 部署到服务器并运行 Docker
      - name: Deploy to Server
        uses: appleboy/ssh-action@master
        with:
            host: ${{ secrets.SERVER_HOST }}
            username: ${{ secrets.SERVER_USER }}
            key: ${{ secrets.SERVER_SSH_KEY }}
            script: |
              # 1. 进入目录并确保代码是最新的
              cd /opt/RuoYi-Vue
              git checkout master  # 或者 hai_dev，根据你当前分支改
              git pull origin master
              
              # 2. 停止并删除旧容器
              docker stop ruoyi-app || true
              docker rm ruoyi-app || true
              
              # 3. 构建镜像（如果 Dockerfile 在根目录）
              # 注意：这一步会触发拉取 OpenJDK 17，如果依然超时，请看下方的镜像加速建议
              docker build -t ruoyi-image:latest .
              
              # 4. 启动新容器
              docker run -d \
                --name ruoyi-app \
                -p 8080:8080 \
                --restart always \
                ruoyi-image:latest
name: Deploy RuoYi Vue

on:
  push:
    branches:
      - master
      - hai_dev

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 设置 JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: 后端打包
        run: mvn clean package -DskipTests

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 14

      - name: 前端打包
        working-directory: ruoyi-ui
        run: |
          npm install
          npm run build:prod

      - name: 上传后端 jar 到服务器
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "ruoyi-admin/target/ruoyi-admin.jar"
          target: "/opt/ruoyi/backend/"
          strip_components: 2

      - name: 上传前端 dist 到服务器
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "ruoyi-ui/dist/**"
          target: "/opt/ruoyi/frontend/dist"
          strip_components: 2

      - name: 重启服务
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /opt/ruoyi
            docker compose restart backend nginx
            docker ps
            

      - name: 飞书通知部署成功
        if: success()
        run: |
          curl -X POST "${{ secrets.FEISHU_WEBHOOK }}" \
            -H "Content-Type: application/json" \
            -d '{
              "msg_type": "text",
              "content": {
                "text": "✅ 若依系统自动部署成功\n分支：${{ github.ref_name }}\n提交人：${{ github.actor }}\n提交信息：${{ github.event.head_commit.message }}\n访问地址：http://47.116.209.164"
              }
            }'
          

      - name: 飞书通知部署失败
        if: failure()
        run: |
          curl -X POST "${{ secrets.FEISHU_WEBHOOK }}" \
            -H "Content-Type: application/json" \
            -d '{
              "msg_type": "text",
              "content": {
                "text": "❌ 若依系统自动部署失败\n分支：${{ github.ref_name }}\n提交人：${{ github.actor }}\n提交信息：${{ github.event.head_commit.message }}\n请去 GitHub Actions 查看日志。"
              }
            }'